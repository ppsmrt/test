<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- ✅ Header -->
  <header class="flex justify-between items-center bg-white shadow px-4 py-3 sticky top-0 z-50">
    <h1 class="text-2xl font-bold text-green-600">TamilGeo</h1>
    <nav class="flex space-x-4">
      <a href="index.html" class="text-gray-700 hover:text-green-600 font-medium">Home</a>
      <a href="about.html" class="text-gray-700 hover:text-green-600 font-medium">About</a>
      <a href="bookmarks.html" class="text-gray-700 hover:text-green-600 font-medium">Bookmarks</a>
    </nav>
  </header>

  <!-- ✅ Main Content -->
  <main class="max-w-5xl mx-auto p-6">

    <!-- 📊 Stats -->
    <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
      <div class="bg-white p-4 rounded shadow">
        <div class="text-sm text-gray-500">Approved Posts</div>
        <div id="approvedCount" class="text-2xl font-bold">0</div>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <div class="text-sm text-gray-500">Pending Posts</div>
        <div id="pendingCount" class="text-2xl font-bold">0</div>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <div class="text-sm text-gray-500">Comments</div>
        <div id="commentsCount" class="text-2xl font-bold">0</div>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <div class="text-sm text-gray-500">Total Likes</div>
        <div id="likesCount" class="text-2xl font-bold">0</div>
      </div>
    </section>

    <!-- 📥 Pending Posts -->
    <section class="bg-white p-6 rounded shadow">
      <h2 class="text-xl font-semibold mb-4">Pending Posts</h2>
      <div id="pending-posts" class="space-y-4"></div>
    </section>

    <!-- 👥 Manage Users -->
    <section class="bg-white p-6 rounded shadow mt-10">
      <h2 class="text-xl font-semibold mb-4">👥 Manage Users</h2>
      <div id="user-list" class="space-y-4"></div>
    </section>

  </main>

  <!-- 🔌 Firebase Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, push, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const pendingRef = ref(db, 'pendingPosts');
    const approvedRef = ref(db, 'posts');
    const commentsRef = ref(db, 'comments');
    const likesRef = ref(db, 'likes');
    const usersRef = ref(db, 'users');

    const pendingContainer = document.getElementById('pending-posts');
    const approvedCountEl = document.getElementById('approvedCount');
    const pendingCountEl = document.getElementById('pendingCount');
    const commentsCountEl = document.getElementById('commentsCount');
    const likesCountEl = document.getElementById('likesCount');
    const userListEl = document.getElementById('user-list');

    // 🟨 Load Pending Posts
    onValue(pendingRef, snapshot => {
      const data = snapshot.val();
      pendingContainer.innerHTML = '';
      pendingCountEl.textContent = data ? Object.keys(data).length : 0;

      if (data) {
        Object.entries(data).forEach(([id, post]) => {
          const el = document.createElement('div');
          el.className = 'p-4 border border-gray-200 rounded';

          el.innerHTML = `
            <h3 class="text-lg font-bold mb-1">${post.title}</h3>
            <p class="text-sm text-gray-600 mb-2">👤 ${post.author} | 🗓 ${new Date(post.date).toLocaleDateString()}</p>
            <p class="mb-2 text-gray-700">${post.excerpt || 'No excerpt available.'}</p>
            <button class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">✅ Approve</button>
          `;

          el.querySelector('button').addEventListener('click', () => {
            push(approvedRef, post);
            remove(ref(db, `pendingPosts/${id}`));
          });

          pendingContainer.appendChild(el);
        });
      }
    });

    // ✅ Load Approved Post Count
    onValue(approvedRef, snapshot => {
      const data = snapshot.val();
      approvedCountEl.textContent = data ? Object.keys(data).length : 0;
    });

    // 💬 Count All Comments
    onValue(commentsRef, snapshot => {
      const data = snapshot.val();
      let count = 0;
      if (data) {
        Object.values(data).forEach(postComments => {
          count += Object.keys(postComments).length;
        });
      }
      commentsCountEl.textContent = count;
    });

    // ❤️ Count All Likes
    onValue(likesRef, snapshot => {
      const data = snapshot.val();
      let totalLikes = 0;
      if (data) {
        Object.values(data).forEach(val => {
          totalLikes += Number(val || 0);
        });
      }
      likesCountEl.textContent = totalLikes;
    });

    // 👥 Manage Users
    onValue(usersRef, snapshot => {
      const users = snapshot.val();
      userListEl.innerHTML = '';

      if (users) {
        Object.entries(users).forEach(([uid, user]) => {
          const wrapper = document.createElement('div');
          wrapper.className = 'p-4 border border-gray-200 rounded flex flex-col md:flex-row md:items-center md:justify-between gap-4';

          wrapper.innerHTML = `
            <div>
              <p class="font-semibold">${user.username || 'No Username'}</p>
              <p class="text-sm text-gray-500">${user.email || 'No Email'}</p>
            </div>
            <div class="flex items-center gap-4">
              <select class="role-dropdown p-1 border rounded text-sm">
                <option value="reader" ${user.role === 'reader' ? 'selected' : ''}>Reader</option>
                <option value="editor" ${user.role === 'editor' ? 'selected' : ''}>Editor</option>
                <option value="manager" ${user.role === 'manager' ? 'selected' : ''}>Manager</option>
                <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
              </select>
              <button class="delete-user bg-red-500 text-white px-2 py-1 rounded text-sm hover:bg-red-600">❌ Delete</button>
            </div>
          `;

          // 🔁 Handle role change
          wrapper.querySelector('.role-dropdown').addEventListener('change', (e) => {
            update(ref(db, `users/${uid}`), { role: e.target.value });
          });

          // ❌ Handle user delete
          wrapper.querySelector('.delete-user').addEventListener('click', () => {
            if (confirm(`Are you sure you want to delete ${user.username || 'this user'}?`)) {
              remove(ref(db, `users/${uid}`));
            }
          });

          userListEl.appendChild(wrapper);
        });
      }
    });

  </script>
</body>
</html>
