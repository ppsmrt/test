<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <header class="bg-white p-4 shadow text-center text-2xl font-bold">🛠 TamilGeo Admin Dashboard</header>

  <main class="max-w-5xl mx-auto p-6">
    
    <!-- 📊 Stats -->
    <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
      <div class="bg-white p-4 rounded shadow">
        <div class="text-sm text-gray-500">Approved Posts</div>
        <div id="approvedCount" class="text-2xl font-bold">0</div>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <div class="text-sm text-gray-500">Pending Posts</div>
        <div id="pendingCount" class="text-2xl font-bold">0</div>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <div class="text-sm text-gray-500">Comments</div>
        <div id="commentsCount" class="text-2xl font-bold">0</div>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <div class="text-sm text-gray-500">Total Likes</div>
        <div id="likesCount" class="text-2xl font-bold">0</div>
      </div>
    </section>

    <!-- 📥 Pending Posts -->
    <section class="bg-white p-6 rounded shadow">
      <h2 class="text-xl font-semibold mb-4">Pending Posts</h2>
      <div id="pending-posts" class="space-y-4">
        <!-- Posts will be injected here -->
      </div>
    </section>
  </main>

  <!-- 🔌 Firebase Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const pendingRef = ref(db, 'pendingPosts');
    const approvedRef = ref(db, 'posts');
    const commentsRef = ref(db, 'comments');
    const likesRef = ref(db, 'likes');

    const pendingContainer = document.getElementById('pending-posts');
    const approvedCountEl = document.getElementById('approvedCount');
    const pendingCountEl = document.getElementById('pendingCount');
    const commentsCountEl = document.getElementById('commentsCount');
    const likesCountEl = document.getElementById('likesCount');

    // 🟨 Load Pending Posts
    onValue(pendingRef, snapshot => {
      const data = snapshot.val();
      pendingContainer.innerHTML = '';
      pendingCountEl.textContent = data ? Object.keys(data).length : 0;

      if (data) {
        Object.entries(data).forEach(([id, post]) => {
          const el = document.createElement('div');
          el.className = 'p-4 border rounded';

          el.innerHTML = `
            <h3 class="text-lg font-bold mb-1">${post.title}</h3>
            <p class="text-sm text-gray-600 mb-2">👤 ${post.author} | 🗓 ${new Date(post.date).toLocaleDateString()}</p>
            <p class="mb-2 text-gray-700">${post.excerpt || 'No excerpt'}</p>
            <button class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700" data-id="${id}">
              ✅ Approve
            </button>
          `;

          el.querySelector('button').addEventListener('click', () => {
            push(approvedRef, post);
            remove(ref(db, `pendingPosts/${id}`));
          });

          pendingContainer.appendChild(el);
        });
      }
    });

    // ✅ Load Approved Post Count
    onValue(approvedRef, snapshot => {
      const data = snapshot.val();
      approvedCountEl.textContent = data ? Object.keys(data).length : 0;
    });

    // 💬 Count All Comments
    onValue(commentsRef, snapshot => {
      const data = snapshot.val();
      let count = 0;
      if (data) {
        Object.values(data).forEach(postComments => {
          count += Object.keys(postComments).length;
        });
      }
      commentsCountEl.textContent = count;
    });

    // ❤️ Count All Likes
    onValue(likesRef, snapshot => {
      const data = snapshot.val();
      let totalLikes = 0;
      if (data) {
        Object.values(data).forEach(val => {
          totalLikes += Number(val || 0);
        });
      }
      likesCountEl.textContent = totalLikes;
    });
  </script>
</body>
</html>
