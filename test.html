<!-- Profile Card -->
<div class="max-w-sm mx-auto mt-8 bg-white rounded-2xl shadow-lg p-6 text-center">
  <!-- Avatar -->
  <div class="relative mx-auto w-24 h-24">
    <img src="https://via.placeholder.com/150"
         alt="Profile Picture"
         class="w-24 h-24 rounded-full border-4 border-white shadow-lg object-cover">
  </div>

  <!-- User Info -->
  <h2 id="profileName" class="mt-4 text-2xl font-bold text-gray-800">Loading...</h2>
  <p id="profileUsername" class="text-gray-500 text-sm">@loading</p>

  <!-- Role Badge -->
  <span id="profileRole"
        class="inline-block mt-3 px-3 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">
    Loading...
  </span>

  <!-- Edit Profile Button -->
  <div class="mt-6">
    <a href="/test/account.html"
       class="inline-block bg-blue-600 text-white px-5 py-2 rounded-lg shadow hover:bg-blue-700 transition">
      Edit Profile
    </a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
    authDomain: "tamilgeoapp.firebaseapp.com",
    databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
    projectId: "tamilgeoapp",
    storageBucket: "tamilgeoapp.appspot.com",
    messagingSenderId: "1092623024431",
    appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const profileName = document.getElementById("profileName");
  const profileUsername = document.getElementById("profileUsername");
  const profileRole = document.getElementById("profileRole");

  const roleColors = {
    admin: "bg-red-100 text-red-800",
    manager: "bg-purple-100 text-purple-800",
    editor: "bg-green-100 text-green-800",
    user: "bg-blue-100 text-blue-800"
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "/login.html";
      return;
    }

    const userRef = ref(db, "users/" + user.uid);
    const snap = await get(userRef);
    const userData = snap.exists() ? snap.val() : {};

    const displayName = userData.displayName || user.displayName || "No Name";
    const role = (userData.role || "user").toLowerCase();

    profileName.textContent = displayName;
    profileUsername.textContent = "@" + (displayName.replace(/\s+/g, "").toLowerCase());
    profileRole.textContent = role.charAt(0).toUpperCase() + role.slice(1);

    // Apply role color
    profileRole.className = `inline-block mt-3 px-3 py-1 text-xs font-semibold rounded-full ${roleColors[role] || roleColors.user}`;
  });
</script>
