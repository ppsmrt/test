<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Account - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

  <!-- ✅ Shared Header -->
  <div id="shared-header"></div>

  <main class="max-w-2xl mx-auto p-6 flex-grow">
    <h1 class="text-3xl font-bold mb-6">👤 My Account</h1>

    <!-- Profile Card -->
    <div id="profileCard" class="bg-white p-6 rounded shadow mb-4 text-center">
      <div class="w-24 h-24 mx-auto rounded-full bg-gray-300 flex items-center justify-center text-gray-600 text-xl font-bold">
        <span id="profileInitial">?</span>
      </div>
      <h2 id="profileName" class="text-xl font-semibold mt-3">Loading...</h2>
      <p id="profileUsername" class="text-gray-500 text-sm"></p>
      <p id="accountCreated" class="text-gray-400 text-xs mt-2"></p>
    </div>

    <!-- Edit Form -->
    <form id="accountForm" class="bg-white p-6 rounded shadow space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Account Name</label>
        <input type="text" id="accountName" class="w-full p-2 border rounded" required>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Username (Display)</label>
        <input type="text" id="username" class="w-full p-2 border rounded bg-gray-100" disabled>
        <p class="text-xs text-gray-500 mt-1">To edit your username, please contact the admin.</p>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Profile Picture</label>
        <input type="file" class="w-full p-2 border rounded bg-gray-50 cursor-not-allowed" disabled>
        <p class="text-xs text-gray-500 mt-1">Profile picture upload coming soon.</p>
      </div>

      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Save Changes</button>
    </form>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const profileInitial = document.getElementById("profileInitial");
    const profileName = document.getElementById("profileName");
    const profileUsername = document.getElementById("profileUsername");
    const accountCreated = document.getElementById("accountCreated");

    const accountNameInput = document.getElementById("accountName");
    const usernameInput = document.getElementById("username");
    const accountForm = document.getElementById("accountForm");

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Please log in to view your account.");
        window.location.href = "/login.html";
        return;
      }

      // Fill profile data
      profileInitial.textContent = user.displayName ? user.displayName.charAt(0).toUpperCase() : "?";
      profileName.textContent = user.displayName || "No Name";
      profileUsername.textContent = user.email;
      accountCreated.textContent = "Account created on: " + new Date(user.metadata.creationTime).toLocaleDateString();

      // Fill form
      accountNameInput.value = user.displayName || "";
      usernameInput.value = user.email;
    });

    accountForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const user = auth.currentUser;
      if (!user) return;

      const newName = accountNameInput.value.trim();
      if (!newName) {
        alert("Name cannot be empty.");
        return;
      }

      updateProfile(user, { displayName: newName }).then(() => {
        alert("✅ Account updated successfully!");
        profileName.textContent = newName;
        profileInitial.textContent = newName.charAt(0).toUpperCase();
      }).catch((err) => {
        console.error(err);
        alert("❌ Error updating account.");
      });
    });
  </script>

  <!-- ✅ Universal Header Loader -->
  <script type="module" src="header.js"></script>

  <!-- ✅ Footer -->
  <footer id="footer" class="mt-auto"></footer>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
