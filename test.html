<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Account - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

  <!-- ✅ Shared Header -->
  <div id="shared-header"></div>

  <!-- Profile Details Card -->
  <div class="max-w-lg mx-auto mt-10 bg-white rounded-xl shadow-lg p-6">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">My Profile</h2>
    
    <div class="space-y-4">
      <div class="flex justify-between border-b pb-2">
        <span class="font-semibold text-gray-700">Name:</span>
        <span id="profileName" class="text-gray-600">Loading...</span>
      </div>
      <div class="flex justify-between border-b pb-2">
        <span class="font-semibold text-gray-700">Username:</span>
        <span id="profileUsername" class="text-gray-600">Loading...</span>
      </div>
      <div class="flex justify-between border-b pb-2">
        <span class="font-semibold text-gray-700">Status:</span>
        <span id="profileRole" class="text-gray-600">Loading...</span>
      </div>
      <div class="flex justify-between border-b pb-2">
        <span class="font-semibold text-gray-700">Account Created On:</span>
        <span id="accountCreated" class="text-gray-600">Loading...</span>
      </div>
      <div class="flex justify-between">
        <span class="font-semibold text-gray-700">Posts Published:</span>
        <span id="postCount" class="text-gray-600">Loading...</span>
      </div>
    </div>

    <!-- Edit Profile Button -->
    <div class="mt-6 text-center">
      <a href="/test/account.html" 
         class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition shadow">
        Edit Profile
      </a>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
    authDomain: "tamilgeoapp.firebaseapp.com",
    databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
    projectId: "tamilgeoapp",
    storageBucket: "tamilgeoapp.appspot.com",
    messagingSenderId: "1092623024431",
    appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const profileName = document.getElementById("profileName");
  const profileUsername = document.getElementById("profileUsername");
  const profileRole = document.getElementById("profileRole");
  const accountCreated = document.getElementById("accountCreated");
  const postCount = document.getElementById("postCount");

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "/login.html";
      return;
    }

    // Fetch user data
    const userRef = ref(db, "users/" + user.uid);
    const snap = await get(userRef);
    const userData = snap.exists() ? snap.val() : {};

    const displayName = userData.displayName || user.displayName || "No Name";
    const username = userData.username || displayName.replace(/\s+/g, "").toLowerCase();
    const role = userData.role || "user";
    const createdDate = user.metadata?.creationTime 
        ? new Date(user.metadata.creationTime).toLocaleDateString()
        : "Unknown";

    profileName.textContent = displayName;
    profileUsername.textContent = "@" + username;
    profileRole.textContent = role.charAt(0).toUpperCase() + role.slice(1);
    accountCreated.textContent = createdDate;

    // Fetch number of posts by this user
    const postsQuery = query(ref(db, "posts"), orderByChild("uid"), equalTo(user.uid));
    const postsSnap = await get(postsQuery);
    postCount.textContent = postsSnap.exists() ? Object.keys(postsSnap.val()).length : 0;
  });
</script>

<!-- ✅ Universal Header Loader -->
<script type="module" src="header.js"></script>

<!-- ✅ Footer -->
<footer id="footer" class="mt-auto"></footer>
<script type="module" src="js/footer.js"></script>

</body>
</html>
