<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Account - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

  <!-- ✅ Shared Header -->
  <div id="shared-header"></div>

 <!-- Profile Card -->
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
  <div class="flex items-center space-x-4">
    <!-- Avatar -->
    <img src="https://via.placeholder.com/80" 
         alt="Profile Picture" 
         class="w-20 h-20 rounded-full border">
    <div>
      <h2 id="profileName" class="text-xl font-bold">Loading...</h2>
      <p id="profileUsername" class="text-gray-500 text-sm">Loading...</p>
      <span id="profileRole" class="inline-block mt-1 px-2 py-1 text-xs font-semibold rounded bg-blue-100 text-blue-800">
        Loading...
      </span>
    </div>
  </div>

  <!-- Edit Button -->
  <div class="mt-6">
    <a href="/account.html" 
       class="block text-center bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      Edit Profile
    </a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
    authDomain: "tamilgeoapp.firebaseapp.com",
    databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
    projectId: "tamilgeoapp",
    storageBucket: "tamilgeoapp.appspot.com",
    messagingSenderId: "1092623024431",
    appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const profileName = document.getElementById("profileName");
  const profileUsername = document.getElementById("profileUsername");
  const profileRole = document.getElementById("profileRole");

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "/login.html";
      return;
    }

    // Fetch user role & name from database
    const userRef = ref(db, "users/" + user.uid);
    const snap = await get(userRef);
    const userData = snap.exists() ? snap.val() : {};

    const displayName = userData.displayName || user.displayName || "No Name";
    const role = userData.role || "user";

    profileName.textContent = displayName;
    profileUsername.textContent = "@" + (displayName.replace(/\s+/g, "").toLowerCase());
    profileRole.textContent = role.charAt(0).toUpperCase() + role.slice(1);
  });
</script>

  <!-- ✅ Universal Header Loader -->
  <script type="module" src="header.js"></script>

  <!-- ✅ Footer -->
  <footer id="footer" class="mt-auto"></footer>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
