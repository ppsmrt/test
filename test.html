<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9fafb;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 0.75rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 1.5rem;
    }
    .grid-2-cols {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.5rem;
    }
    .card h2 {
      margin-bottom: 1rem;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .card a {
      display: block;
      padding: 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid #ddd;
      background: #f8fafc;
      color: #333;
      text-decoration: none;
      transition: background 0.2s;
      text-align: left;
    }
    .card a:hover {
      background: #f1f5f9;
    }
    .mb-6 { margin-bottom: 1.5rem; }
  </style>
</head>
<body>
<div class="container">

  <!-- Welcome -->
  <section class="card mb-6">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span style="font-size:1.5rem;color:#f59e0b;"><i class="fa-solid fa-hand"></i></span>
      <h1 style="font-size:1.25rem;font-weight:bold;">
        Hi, <span id="userNameDisplay"></span>
      </h1>
    </div>
    <p style="color:#4b5563;margin-top:0.5rem;">Welcome back, we hope the day is well</p>
  </section>

  <!-- Stats -->
  <section class="grid-2-cols mb-6">
    <div class="card text-center">
      <h3>Total Posts</h3>
      <p id="stat-posts">0</p>
    </div>
    <div class="card text-center">
      <h3>Followers</h3>
      <p id="stat-followers">0</p>
    </div>
    <div class="card text-center">
      <h3>Likes</h3>
      <p id="stat-likes">0</p>
    </div>
    <div class="card text-center">
      <h3>Comments</h3>
      <p id="stat-comments">0</p>
    </div>
  </section>

  <!-- Quick Actions -->
  <section class="card mb-6">
    <h2><i class="fa-solid fa-bolt"></i> Quick Actions</h2>
    <div class="grid-2-cols">
      <a href="create.html"><i class="fa-solid fa-pen"></i> Create Post</a>
      <a href="edit.html"><i class="fa-solid fa-edit"></i> Edit Post</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
      <a href="logout.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>
    <div style="margin-top:1rem;">
      <a href="posts.html"><i class="fa-solid fa-eye"></i> View Posts</a>
    </div>
  </section>

  <!-- Important Links -->
  <section class="card mb-6">
    <h2><i class="fa-solid fa-link"></i> Important Links</h2>
    <div class="grid-2-cols">
      <a href="about.html"><i class="fa-solid fa-circle-info"></i> About Website</a>
      <a href="privacy.html"><i class="fa-solid fa-lock"></i> Privacy Policy</a>
      <a href="terms.html"><i class="fa-solid fa-file-contract"></i> Terms & Conditions</a>
      <a href="disclaimer.html"><i class="fa-solid fa-triangle-exclamation"></i> Disclaimer</a>
    </div>
  </section>

  <!-- Account Form -->
  <form id="accountForm" class="card mb-6">
    <div>
      <label>Account Name</label>
      <input type="text" id="name" class="w-full p-2 border rounded" required>
    </div>
    <div>
      <label>Username</label>
      <input type="text" id="usernameField" readonly class="w-full p-2 border rounded bg-gray-100">
    </div>
    <div>
      <label>Email</label>
      <input type="email" id="emailField" readonly class="w-full p-2 border rounded bg-gray-100">
    </div>
    <div>
      <label>Bio</label>
      <textarea id="bioField" rows="3" class="w-full p-2 border rounded"></textarea>
    </div>
    <div>
      <label>Profile Picture</label>
      <input type="file" id="profilePicInput" accept="image/*">
      <img id="profilePicPreview" style="margin-top:0.5rem;max-height:100px;border-radius:0.5rem;"/>
    </div>
    <button type="submit" style="background:#2563eb;color:white;padding:0.5rem 1rem;border-radius:0.5rem;">Save Changes</button>
  </form>

</div>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_DOMAIN",
    databaseURL: "YOUR_DB_URL",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MSG_ID",
    appId: "YOUR_APP_ID"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
  const storage = firebase.storage();

  // Welcome Name Fallback
  auth.onAuthStateChanged(user => {
    if (!user) {
      document.getElementById("userNameDisplay").textContent = "Guest";
      return;
    }
    db.ref("users/" + user.uid).once("value").then(snapshot => {
      const data = snapshot.val();
      document.getElementById("userNameDisplay").textContent = data?.name || "Guest";
      document.getElementById("name").value = data?.name || "";
      document.getElementById("usernameField").value = data?.username || "";
      document.getElementById("emailField").value = data?.email || "";
      document.getElementById("bioField").value = data?.bio || "";
      if (data?.profilePicUrl) {
        document.getElementById("profilePicPreview").src = data.profilePicUrl;
      }
    });
  });

  // Handle form submit
  document.getElementById("accountForm").addEventListener("submit", async e => {
    e.preventDefault();
    const user = auth.currentUser;
    if (!user) return;

    const name = document.getElementById("name").value;
    const bio = document.getElementById("bioField").value;
    const file = document.getElementById("profilePicInput").files[0];

    let profilePicUrl = null;
    if (file) {
      const compressed = await compressImage(file, 0.7);
      const encrypted = await encryptImage(compressed);
      const storageRef = storage.ref("profilePics/" + user.uid + ".enc");
      await storageRef.put(encrypted);
      profilePicUrl = await storageRef.getDownloadURL();
    }

    await db.ref("users/" + user.uid).update({
      name,
      bio,
      ...(profilePicUrl && { profilePicUrl })
    });

    location.reload(); // refresh after save
  });

  // Image compression
  function compressImage(file, quality) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = event => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          canvas.toBlob(blob => resolve(blob), "image/jpeg", quality);
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // Simple AES encryption
  async function encryptImage(blob) {
    const key = await crypto.subtle.generateKey(
      { name: "AES-GCM", length: 256 },
      true,
      ["encrypt", "decrypt"]
    );
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const buffer = await blob.arrayBuffer();
    const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, buffer);
    return new Blob([iv, new Uint8Array(encrypted)], { type: "application/octet-stream" });
  }
</script>
</body>
</html>
