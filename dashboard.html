<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 flex flex-col min-h-screen">

  <!-- ✅ Site Header -->
  <header class="flex justify-between items-center bg-white shadow px-4 py-3 sticky top-0 z-50">
    <h1 class="text-2xl font-bold text-green-600">TamilGeo</h1>
    <nav class="flex space-x-4">
      <a href="index.html" class="text-gray-700 hover:text-green-600 font-medium">Home</a>
      <a href="about.html" class="text-gray-700 hover:text-green-600 font-medium">About</a>
      <a href="contact.html" class="text-gray-700 hover:text-green-600 font-medium">Contact</a>
      <a href="donate.html" class="text-gray-700 hover:text-green-600 font-medium">Donate Me</a>
      <a href="bookmarks.html" class="text-gray-700 hover:text-green-600 font-medium">Bookmarks</a>
    </nav>
  </header>

  <!-- 🔒 Sign Out and Contact Admin -->
  <div class="bg-red-100 text-red-700 p-3 flex justify-between items-center px-4">
    <span>Having trouble? <a href="contact.html" class="underline font-semibold">Contact Admin</a></span>
    <button onclick="logout()" class="text-sm px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600">Sign Out ✖</button>
  </div>

  <!-- ✅ Dashboard Content -->
  <main class="max-w-3xl mx-auto mt-6 bg-white p-6 rounded shadow space-y-8 flex-grow">

    <!-- 👤 Profile Section -->
    <section>
      <h2 class="text-xl font-semibold mb-4">👤 Your Profile</h2>
      <form id="profile-form" class="space-y-4">
        <input type="text" id="name" placeholder="Your Name" class="w-full p-3 border rounded" required />
        <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded" required />
        <input type="url" id="photoURL" placeholder="Profile Picture URL" class="w-full p-3 border rounded" />
        <input type="password" id="newPassword" placeholder="Change Password" class="w-full p-3 border rounded" />

        <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">
          💾 Save Changes
        </button>
      </form>
    </section>

    <!-- ✍️ Submit Post -->
    <section>
      <h2 class="text-xl font-semibold mb-4">✍️ Submit a Post</h2>
      <a href="submit.html" class="inline-block bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        Go to Submit Page →
      </a>
    </section>

    <!-- 🔖 Bookmarks -->
    <section>
      <h2 class="text-xl font-semibold mb-4">🔖 Your Bookmarks</h2>
      <a href="bookmarks.html" class="inline-block bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
        View Bookmarks →
      </a>
    </section>
  </main>

  <!-- ⚖️ Footer -->
  <footer class="bg-white border-t mt-10 p-4 text-center text-sm text-gray-600">
    <a href="privacy.html" class="hover:text-green-600">Privacy Policy</a> |
    <a href="disclaimer.html" class="hover:text-green-600">Disclaimer</a> |
    <a href="terms.html" class="hover:text-green-600">Terms of Use</a>
  </footer>

  <!-- 🔌 Firebase Auth/Profile Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      updateProfile,
      updatePassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getDatabase,
      ref,
      get,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, user => {
      if (!user) return window.location.href = "login.html";

      const uid = user.uid;
      const userRef = ref(db, 'users/' + uid);

      get(userRef).then(snapshot => {
        const data = snapshot.val();
        if (data?.role === 'admin') window.location.href = 'admin.html';

        document.getElementById('name').value = data.name || '';
        document.getElementById('username').value = data.username || '';
        document.getElementById('photoURL').value = user.photoURL || '';
      });

      document.getElementById('profile-form').addEventListener('submit', e => {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const username = document.getElementById('username').value;
        const photoURL = document.getElementById('photoURL').value;
        const newPassword = document.getElementById('newPassword').value;

        updateProfile(user, { displayName: name, photoURL }).then(() => {
          update(userRef, { name, username, photoURL });
          if (newPassword) updatePassword(user, newPassword);
          alert('✅ Profile updated!');
        });
      });
    });

    window.logout = () => {
      signOut(auth).then(() => window.location.href = 'login.html');
    }
  </script>
</body>
</html>
