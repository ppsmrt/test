<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

  <!-- ✅ Shared Header -->
  <div id="shared-header"></div>

  <main class="max-w-7xl mx-auto p-6 flex-grow fade-in">
    <h1 class="text-3xl font-bold mb-6">📊 Admin Dashboard</h1>

    <!-- 📌 Admin Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
      <div class="bg-white shadow rounded-lg p-6">
        <h2 class="text-lg font-semibold mb-2">Total Users</h2>
        <p id="totalUsers" class="text-2xl font-bold">0</p>
      </div>
      <div class="bg-white shadow rounded-lg p-6">
        <h2 class="text-lg font-semibold mb-2">Total Posts</h2>
        <p id="totalPosts" class="text-2xl font-bold">0</p>
      </div>
      <div class="bg-white shadow rounded-lg p-6">
        <h2 class="text-lg font-semibold mb-2">Pending Approvals</h2>
        <p id="pendingApprovals" class="text-2xl font-bold">0</p>
      </div>
    </div>

    <!-- 📌 Admin Controls -->
    <div class="bg-white shadow rounded-lg p-6 mb-6">
      <h2 class="text-xl font-semibold mb-4">Manage Content</h2>
      <div class="space-y-4">
        <button id="managePosts" class="bg-blue-600 text-white px-4 py-2 rounded">Manage Posts</button>
        <button id="manageUsers" class="bg-green-600 text-white px-4 py-2 rounded">Manage Users</button>
      </div>
    </div>

    <!-- 📌 Recent Posts (Admin View) -->
    <div class="bg-white shadow rounded-lg p-6">
      <h2 class="text-xl font-semibold mb-4">Recent Posts</h2>
      <ul id="recentPosts" class="space-y-2"></ul>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        alert("Please log in to view this dashboard.");
        window.location.href = "/login.html";
        return;
      }

      try {
        const userSnap = await get(ref(db, "users/" + user.uid));
        if (!userSnap.exists() || userSnap.val().role !== "admin") {
          alert("Access denied. Admins only.");
          window.location.href = "/";
          return;
        }

        const usersSnap = await get(ref(db, "users"));
        document.getElementById("totalUsers").textContent = usersSnap.size || Object.keys(usersSnap.val() || {}).length;

        const postsSnap = await get(ref(db, "posts"));
        document.getElementById("totalPosts").textContent = postsSnap.size || Object.keys(postsSnap.val() || {}).length;

        let pendingCount = 0;
        let recentHTML = "";
        postsSnap.forEach(post => {
          if (post.val().status === "pending") pendingCount++;
          recentHTML += `<li class="border-b pb-2">${post.val().title}</li>`;
        });
        document.getElementById("pendingApprovals").textContent = pendingCount;
        document.getElementById("recentPosts").innerHTML = recentHTML || "<li>No posts available</li>";

      } catch (err) {
        console.error(err);
      }
    });
  </script>

  <!-- ✅ Universal Header Loader -->
  <script type="module" src="header.js"></script>

  <!-- ✅ Footer -->
  <footer id="footer" class="mt-auto"></footer>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
