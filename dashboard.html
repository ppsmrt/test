<!DOCTYPE html><html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 flex flex-col min-h-screen">
  <!-- ✅ Universal Header -->
  <div id="shared-header"></div>  <!-- 🔒 Welcome + Logout -->  <div class="bg-blue-100 text-blue-800 p-3 flex justify-between items-center px-4">
    <span id="welcome-message">Welcome, </span>
    <button id="logout-btn" class="text-sm px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600">Sign Out ✖</button>
  </div>  <!-- ✅ Dashboard Main -->  <main class="w-full max-w-screen-xl mx-auto mt-6 p-4 flex-grow">
    <!-- 🔧 Admin Panel -->
    <section id="admin-section" class="hidden space-y-8">
      <h2 class="text-2xl font-bold text-green-700">🔧 Admin Panel</h2><!-- 📊 Analytics -->
  <div class="bg-white shadow rounded-lg p-6">
    <h3 class="text-xl font-semibold text-indigo-700 mb-4">📊 App Analytics</h3>
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="bg-indigo-100 text-indigo-800 p-4 rounded">Total Users: <span id="analytics-users">...</span></div>
      <div class="bg-indigo-100 text-indigo-800 p-4 rounded">Posts Created: <span id="analytics-posts">...</span></div>
    </div>
  </div>

  <!-- 👥 Manage Users -->
  <div class="bg-white shadow rounded-lg p-6">
    <h3 class="text-xl font-semibold text-indigo-700 mb-4">👥 Manage Users</h3>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-100">
          <tr>
            <th class="text-left p-2">Name</th>
            <th class="text-left p-2">Email</th>
            <th class="text-left p-2">Role</th>
            <th class="text-left p-2">Username</th>
            <th class="text-left p-2">Actions</th>
          </tr>
        </thead>
        <tbody id="user-table"></tbody>
      </table>
    </div>
  </div>

  <!-- ✍️ Manage Posts -->
  <div class="bg-white shadow rounded-lg p-6">
    <h3 class="text-xl font-semibold text-indigo-700 mb-4">✍️ Manage Posts</h3>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-100">
          <tr>
            <th class="text-left p-2">Title</th>
            <th class="text-left p-2">Author</th>
            <th class="text-left p-2">Date</th>
            <th class="text-left p-2">Status</th>
            <th class="text-left p-2">Actions</th>
          </tr>
        </thead>
        <tbody id="post-table"></tbody>
      </table>
    </div>
  </div>

  <!-- ⏳ Pending Approval -->
  <div class="bg-white shadow rounded-lg p-6">
    <h3 class="text-xl font-semibold text-yellow-600 mb-4">⏳ Pending Approval</h3>
    <div id="pending-approval-list" class="space-y-4"></div>
  </div>

  <!-- 📢 Admin Notifications -->
  <div class="bg-white shadow rounded-lg p-6">
    <h3 class="text-xl font-semibold text-red-600 mb-4">📢 Send Notification to All Users</h3>
    <textarea id="admin-announcement" rows="3" class="w-full p-3 border rounded" placeholder="Write announcement..."></textarea>
    <button id="send-announcement" class="mt-3 bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700">📣 Send Notification</button>
  </div>
</section>

<!-- 👤 User Profile -->
<section id="user-section" class="bg-white shadow rounded-lg p-6 mt-10">
  <h2 class="text-xl font-semibold mb-4">👤 Your Profile</h2>
  <form id="profile-form" class="space-y-4">
    <input type="text" id="name" placeholder="Your Name" class="w-full p-3 border rounded" required />
    <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded" disabled />
    <input type="url" id="photoURL" placeholder="Profile Picture URL" class="w-full p-3 border rounded" />
    <input type="password" id="newPassword" placeholder="Change Password" class="w-full p-3 border rounded" />
    <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">📂 Save Changes</button>
  </form>

  <!-- 📜 Notification Panel -->
  <div class="mt-6">
    <h3 class="text-lg font-semibold text-purple-700 mb-2">📢 Recent Notifications</h3>
    <marquee id="user-notification-marquee" class="bg-purple-100 text-purple-900 p-2 rounded"></marquee>
    <a href="notifications.html" class="block mt-2 text-blue-600 text-sm hover:underline">View All Notifications</a>
  </div>
</section>

  </main>  <!-- ✅ Footer -->  <div id="footer"></div>  <!-- 🔌 Firebase Logic -->  <script type="module" src="js/dashboard.js"></script>  <!-- ✅ Universal Header & Footer Loaders -->  <script src="/header.js"></script>  <script src="js/footer.js"></script></body>
</html>
