<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 flex flex-col min-h-screen">

  <!-- ✅ Shared Header -->
  <div id="shared-header"></div>

  <!-- 🛠 Admin Pending Posts -->
  <main class="max-w-6xl mx-auto p-6 flex-grow">
    <h1 class="text-3xl font-bold mb-6">🛠 Pending Posts for Approval</h1>
    <div id="pending-container" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
  </main>

  <!-- 🔥 Firebase Admin Approval Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getDatabase, ref, onValue, set, remove 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { 
      getAuth, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const pendingRef = ref(db, 'pendingPosts');
    const container = document.getElementById('pending-container');

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("You must be logged in as admin to view this page.");
        window.location.href = "/login.html";
      } else {
        // Load pending posts for admin
        onValue(pendingRef, (snapshot) => {
          container.innerHTML = "";
          snapshot.forEach(childSnapshot => {
            const key = childSnapshot.key;
            const post = childSnapshot.val();

            container.innerHTML += `
              <div class="bg-white rounded-lg shadow overflow-hidden flex flex-col">
                ${post.image ? `<img src="${post.image}" alt="${post.title}" class="w-full h-48 object-cover"/>` : ""}
                <div class="p-4 flex flex-col flex-grow">
                  <h2 class="text-xl font-bold mb-2">${post.title}</h2>
                  <p class="text-gray-700 text-sm mb-4 flex-grow">
                    ${post.excerpt ? post.excerpt : (post.content ? post.content.substring(0, 120) + "..." : "")}
                  </p>
                  <p class="text-xs text-gray-500 mt-auto">By ${post.author || "Unknown"}</p>
                  <button class="bg-green-500 hover:bg-green-600 text-white px-3 py-2 mt-4 rounded"
                    onclick="approvePost('${key}')">✅ Approve</button>
                </div>
              </div>
            `;
          });
        });
      }
    });

    // Approve Post Function
    window.approvePost = (postId) => {
      const postRef = ref(db, `pendingPosts/${postId}`);
      onValue(postRef, (snapshot) => {
        if (snapshot.exists()) {
          const postData = snapshot.val();
          const approvedPostRef = ref(db, `posts/${postId}`);
          
          set(approvedPostRef, {
            ...postData,
            date: Date.now(), // Set approval time
          }).then(() => {
            remove(postRef); // Remove from pending
            alert("Post approved!");
          });
        }
      }, { onlyOnce: true });
    };
  </script>

  <!-- ✅ Universal Header Loader -->
  <script type="module" src="header.js"></script>

  <!-- ✅ Footer Loader -->
  <footer id="footer" class="mt-auto"></footer>
  <script type="module" src="js/footer.js"></script>

</body>
</html>
