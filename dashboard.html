<!DOCTYPE html><html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 flex flex-col min-h-screen">  <!-- ✅ Shared Universal Header -->  <header class="flex justify-between items-center bg-white shadow px-4 py-3 sticky top-0 z-50">
    <h1 class="text-2xl font-bold text-green-600">TamilGeo</h1>
    <nav class="flex space-x-4">
      <a href="index.html" class="text-gray-700 hover:text-green-600 font-medium">Home</a>
      <a href="about.html" class="text-gray-700 hover:text-green-600 font-medium">About</a>
      <a href="bookmarks.html" class="text-gray-700 hover:text-green-600 font-medium">Bookmarks</a>
    </nav>
  </header>  <!-- 🔒 Welcome and Sign Out -->  <div class="bg-blue-100 text-blue-800 p-3 flex justify-between items-center px-4">
    <span id="welcome-message">Welcome, </span>
    <button onclick="logout()" class="text-sm px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600">Sign Out ✖</button>
  </div>  <!-- ✅ Dashboard Content -->  <main class="w-full max-w-screen-xl mx-auto mt-6 bg-white p-6 rounded shadow space-y-12 flex-grow"><!-- Admin Panel Section -->
<section id="admin-section" class="hidden">
  <h2 class="text-2xl font-bold text-green-700 mb-6">🛠 Admin Panel</h2>

  <!-- 📊 App Analytics Section -->
  <div>
    <h3 class="text-xl font-semibold text-indigo-700 mb-4">📊 App Analytics</h3>
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="bg-indigo-100 text-indigo-800 p-4 rounded shadow">Total Users: 1,234</div>
      <div class="bg-indigo-100 text-indigo-800 p-4 rounded shadow">Active Users Today: 245</div>
      <div class="bg-indigo-100 text-indigo-800 p-4 rounded shadow">Posts Created: 567</div>
      <div class="bg-indigo-100 text-indigo-800 p-4 rounded shadow">Reports Filed: 23</div>
      <div class="bg-indigo-100 text-indigo-800 p-4 rounded shadow">Bookmarks Saved: 934</div>
      <div class="bg-indigo-100 text-indigo-800 p-4 rounded shadow">Polls/Votes Cast: 112</div>
    </div>
  </div>

  <!-- Additional sections for other admin features will go here -->

</section>

<!-- User Profile Section -->
<section id="user-section">
  <h2 class="text-xl font-semibold mb-4">👤 Your Profile</h2>
  <form id="profile-form" class="space-y-4">
    <input type="text" id="name" placeholder="Your Name" class="w-full p-3 border rounded" required />
    <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded" required />
    <input type="url" id="photoURL" placeholder="Profile Picture URL" class="w-full p-3 border rounded" />
    <input type="password" id="newPassword" placeholder="Change Password" class="w-full p-3 border rounded" />
    <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">💾 Save Changes</button>
  </form>
</section>

<!-- Bookmarks and Actions for Reader -->
<section id="user-actions">
  <h2 class="text-xl font-semibold mb-4">⚡ Quick Actions</h2>
  <div class="grid sm:grid-cols-2 gap-4">
    <a href="submit.html" class="block bg-blue-600 text-white text-center px-4 py-2 rounded hover:bg-blue-700">✍️ Submit a Post</a>
    <a href="bookmarks.html" class="block bg-purple-600 text-white text-center px-4 py-2 rounded hover:bg-purple-700">🔖 View Bookmarks</a>
    <a href="contact.html" class="block bg-yellow-500 text-white text-center px-4 py-2 rounded hover:bg-yellow-600">📬 Contact Admin</a>
    <a href="donate.html" class="block bg-pink-600 text-white text-center px-4 py-2 rounded hover:bg-pink-700">💖 Donate Me</a>
  </div>
</section>

  </main>  <!-- ✅ Footer -->  <div id="footer"></div>  <!-- 🔌 Firebase Auth/Profile Logic -->  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      updateProfile,
      updatePassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getDatabase,
      ref,
      get,
      update,
      set
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "login.html";

      const uid = user.uid;
      const userRef = ref(db, 'users/' + uid);

      const snapshot = await get(userRef);
      let userData = snapshot.val();

      // First time login: Create profile
      if (!userData) {
        const isAdmin = user.email === "ppsmart7@gmail.com";
        userData = {
          email: user.email || "",
          name: user.displayName || "Unnamed User",
          username: (user.displayName || "user").toLowerCase().replace(/\s+/g, ''),
          photoURL: user.photoURL || "",
          role: isAdmin ? "admin" : "reader",
          createdAt: new Date().toISOString()
        };
        await set(userRef, userData);
      }

      // Update UI
      const name = userData.name || user.displayName || "User";
      document.getElementById("welcome-message").textContent = `Welcome, ${name}`;

      if (userData.role === "admin") {
        document.getElementById("admin-section").classList.remove("hidden");
        document.getElementById("user-section").classList.add("hidden");
        document.getElementById("user-actions").classList.add("hidden");
      } else {
        document.getElementById("name").value = userData.name || "";
        document.getElementById("username").value = userData.username || "";
        document.getElementById("photoURL").value = userData.photoURL || "";
      }

      // Form submission
      const form = document.getElementById("profile-form");
      form?.addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value;
        const username = document.getElementById("username").value;
        const photoURL = document.getElementById("photoURL").value;
        const newPassword = document.getElementById("newPassword").value;

        await updateProfile(user, { displayName: name, photoURL });
        await update(userRef, { name, username, photoURL });

        if (newPassword) {
          await updatePassword(user, newPassword);
        }

        alert("✅ Profile updated!");
      });
    });

    window.logout = () => {
      signOut(auth).then(() => window.location.href = 'login.html');
    }
  </script>  <!-- ✅ Footer Loader -->  <script src="js/footer.js"></script></body>
</html>
