<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Handshake animation */
    .wave {
      display: inline-block;
      animation: wave 2s ease-in-out;
      transform-origin: 70% 70%;
    }
    @keyframes wave {
      0% { transform: rotate(0deg); }
      20% { transform: rotate(14deg); }
      40% { transform: rotate(-8deg); }
      60% { transform: rotate(14deg); }
      80% { transform: rotate(-4deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 flex flex-col min-h-screen">

  <!-- Shared Header -->
  <div id="shared-header"></div>

  <!-- Main Content -->
  <main class="w-full max-w-4xl mx-auto mt-8 bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
      <span id="handshake-icon" style="font-size: 1.5em;">🤝</span>
      Welcome to Your Account
    </h2>

    <!-- Profile Section -->
    <div class="flex flex-col items-center mb-6">
      <img id="profile-pic" src="https://via.placeholder.com/100" alt="Profile" class="w-24 h-24 rounded-full object-cover border">
      <input type="file" id="profile-upload" accept="image/*" class="mt-3 border p-1 rounded"/>
    </div>

    <!-- Site Pages -->
    <section>
      <h3 class="text-xl font-semibold mb-3">Site Pages</h3>
      <div class="flex gap-4 flex-wrap">
        <a href="index.html" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Home</a>
        <a href="dashboard.html" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Dashboard</a>
      </div>
    </section>

    <!-- Add gap -->
    <div class="my-6"></div>

    <!-- Edit Profile -->
    <section>
      <h3 class="text-xl font-semibold mb-3">Edit Profile</h3>
      <form id="edit-profile-form" class="space-y-4">
        <input type="text" id="display-name" placeholder="Display Name" class="w-full p-3 border rounded"/>
        <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Save</button>
      </form>
    </section>
  </main>

  <!-- Footer -->
  <div id="footer" class="mt-8"></div>

  <!-- Firebase Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const handshakeIcon = document.getElementById("handshake-icon");
    const profilePic = document.getElementById("profile-pic");
    const profileUpload = document.getElementById("profile-upload");

    // Compress & convert to Base64
    function compressImage(file, callback) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          const maxSize = 150;
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > maxSize) {
              height *= maxSize / width;
              width = maxSize;
            }
          } else {
            if (height > maxSize) {
              width *= maxSize / height;
              height = maxSize;
            }
          }

          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          const base64String = canvas.toDataURL("image/jpeg", 0.7);
          callback(base64String);
        };
      };
      reader.readAsDataURL(file);
    }

    profileUpload.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        compressImage(file, (base64) => {
          const user = auth.currentUser;
          if (user) {
            set(ref(db, `users/${user.uid}/profilePic`), base64)
              .then(() => {
                profilePic.src = base64;
              })
              .catch(err => console.error("Error saving profile picture:", err));
          }
        });
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Handshake animation
        handshakeIcon.classList.add("wave");
        setTimeout(() => handshakeIcon.classList.remove("wave"), 2000);

        // Load profile pic if exists
        get(ref(db, `users/${user.uid}/profilePic`)).then(snapshot => {
          if (snapshot.exists()) {
            profilePic.src = snapshot.val();
          }
        });
      } else {
        window.location.href = "login.html";
      }
    });
  </script>

  <script type="module" src="header.js"></script>
  <script type="module" src="/js/footer.js"></script>
</body>
</html>
