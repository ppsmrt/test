<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

  <!-- Welcome Section -->
  <div class="flex items-center justify-center min-h-screen bg-gray-100 p-6">
    <div class="bg-white shadow-lg rounded-lg max-w-4xl w-full p-8">
      <h1 class="text-3xl font-bold text-center mb-6">
        Hai, <span id="userNameDisplay" class="capitalize"></span>
      </h1>
      <p class="text-center text-gray-600 mb-8">Welcome to your account dashboard</p>
      <div class="flex justify-center mb-6">
        <img id="profilePic" src="" alt="Profile Picture" class="w-32 h-32 rounded-full object-cover border-4 border-gray-300">
      </div>
    </div>
  </div>

  <!-- Account Form Section -->
  <div class="max-w-4xl mx-auto mt-10 bg-white shadow-lg rounded-lg p-8">
    <form id="accountForm" class="space-y-6">
      <div>
        <label class="block mb-1 text-sm font-medium text-gray-700">Name</label>
        <input type="text" id="nameInput" class="w-full p-2 border rounded" required>
      </div>

      <div>
        <label class="block mb-1 text-sm font-medium text-gray-700">Bio</label>
        <textarea id="bioField" rows="3" class="w-full p-2 border rounded"></textarea>
      </div>

      <div>
        <label class="block mb-1 text-sm font-medium text-gray-700">Profile Picture</label>
        <input type="file" id="profilePicInput" accept="image/*" class="w-full p-2 border rounded">
      </div>

      <button type="submit" class="w-full bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600">
        Update Account
      </button>
    </form>
  </div>

  <script type="module">
    import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-storage.js";
    import { app } from "./firebase.js";

    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);

    const userNameDisplay = document.getElementById('userNameDisplay');
    const nameInput = document.getElementById('nameInput');
    const bioField = document.getElementById('bioField');
    const profilePic = document.getElementById('profilePic');
    const profilePicInput = document.getElementById('profilePicInput');
    const accountForm = document.getElementById('accountForm');

    onAuthStateChanged(auth, (user) => {
      if (user) {
        get(ref(db, "users/" + user.uid)).then(snapshot => {
          if (snapshot.exists()) {
            const data = snapshot.val();
            userNameDisplay.textContent = data.name || "User";
            nameInput.value = data.name || "";
            bioField.value = data.bio || "";
            if (data.profilePicture) profilePic.src = data.profilePicture;
          }
        });
      }
    });

    accountForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = auth.currentUser;
      if (!user) return;

      const updatedName = nameInput.value.trim();
      const updatedBio = bioField.value.trim();
      let downloadURL = null;

      const file = profilePicInput.files?.[0];
      if (file) {
        const storageRef = sRef(storage, `profilePictures/${user.uid}`);
        await uploadBytesResumable(storageRef, file);
        downloadURL = await getDownloadURL(storageRef);
      }

      const updateData = { name: updatedName, bio: updatedBio };
      if (downloadURL) updateData.profilePicture = downloadURL;

      await update(ref(db, "users/" + user.uid), updateData);
      await updateProfile(user, { displayName: updatedName, photoURL: downloadURL || user.photoURL });
      alert("Account updated successfully!");
    });
  </script>

</body>
</html>
