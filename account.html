<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes handshake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }
    .animate-handshake {
      animation: handshake 1s ease-in-out;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Loading Screen -->
  <div id="loading-screen" class="flex justify-center items-center h-screen">
    <p class="text-lg">Loading...</p>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden flex-1">
    <header class="bg-white shadow p-4 flex justify-between items-center">
      <h1 class="text-xl font-bold flex items-center gap-2">
        Welcome, <span id="user-name">User</span>
        <span id="handshake">🤝</span>
        <span id="role-badge" class="ml-2 text-xs font-bold px-2 py-1 rounded"></span>
      </h1>
      <button id="logout" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">Logout</button>
    </header>

    <main class="p-4 space-y-6">
      
      <!-- Notifications -->
      <section class="bg-white p-4 rounded-lg shadow">
        <h2 class="text-lg font-semibold mb-2">🔔 Notifications</h2>
        <p id="notification" class="text-gray-700">Loading notifications...</p>
      </section>

      <!-- Quick Actions -->
      <section class="bg-white p-4 rounded-lg shadow">
        <h2 class="text-lg font-semibold mb-4">⚡ Quick Actions</h2>
        <div class="grid sm:grid-cols-2 gap-4">
          <a href="submit.html" class="bg-blue-500 text-white p-4 rounded-lg text-center shadow hover:bg-blue-600 transition">✍️ Submit a Post</a>
          <a href="posts.html" class="bg-green-500 text-white p-4 rounded-lg text-center shadow hover:bg-green-600 transition">🪧 View Your Post</a>
          <a href="bookmarks.html" class="bg-yellow-500 text-white p-4 rounded-lg text-center shadow hover:bg-yellow-600 transition">🔖 Bookmarks</a>
          <a href="settings.html" class="bg-gray-500 text-white p-4 rounded-lg text-center shadow hover:bg-gray-600 transition">⚙️ Settings</a>
        </div>
      </section>

      <!-- Stats Section -->
      <section class="bg-white p-4 rounded-lg shadow">
        <h2 class="text-lg font-semibold mb-4">📊 Stats</h2>
        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
          <div class="bg-blue-100 p-4 rounded-lg text-center">
            <p class="text-2xl font-bold">12</p>
            <p class="text-gray-600">Posts</p>
          </div>
          <div class="bg-green-100 p-4 rounded-lg text-center">
            <p class="text-2xl font-bold">45</p>
            <p class="text-gray-600">Likes</p>
          </div>
          <div class="bg-yellow-100 p-4 rounded-lg text-center">
            <p class="text-2xl font-bold">8</p>
            <p class="text-gray-600">Bookmarks</p>
          </div>
          <div class="bg-purple-100 p-4 rounded-lg text-center">
            <p class="text-2xl font-bold">3</p>
            <p class="text-gray-600">Comments</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    // All imports consolidated at top
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDuPncZ8GBfmRZx2sX20a93gMIgOieN0oc",
      authDomain: "linkhub-50178.firebaseapp.com",
      databaseURL: "https://linkhub-50178-default-rtdb.firebaseio.com",
      projectId: "linkhub-50178",
      storageBucket: "linkhub-50178.appspot.com",
      messagingSenderId: "768643045650",
      appId: "1:768643045650:web:64feaf7c5cfdf1cdcd6be2",
      measurementId: "G-6V8T7WFXP9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    function animateHandshakeOnce() {
      const handshake = document.getElementById("handshake");
      if (!handshake) return;
      handshake.classList.add("animate-handshake");
      setTimeout(() => {
        handshake.classList.remove("animate-handshake");
      }, 1000);
    }

    onAuthStateChanged(auth, (user) => {
      const loadingScreen = document.getElementById("loading-screen");
      const dashboard = document.getElementById("dashboard");
      const userNameElem = document.getElementById("user-name");

      if (user) {
        const userRef = ref(db, `users/${user.uid}`);
        onValue(userRef, (snapshot) => {
          const data = snapshot.val();
          if (data && data.username) {
            userNameElem.textContent = data.username;
            animateHandshakeOnce();
          } else {
            userNameElem.textContent = "User";
            animateHandshakeOnce();
          }
        });

        const notificationsRef = query(ref(db, `notifications/${user.uid}`), limitToLast(1));
        onValue(notificationsRef, (snapshot) => {
          const notificationContainer = document.getElementById("notification");
          if (snapshot.exists()) {
            snapshot.forEach((childSnapshot) => {
              notificationContainer.textContent = childSnapshot.val().message || "You have a new notification!";
            });
          } else {
            notificationContainer.textContent = "No new notifications.";
          }
        });

        loadingScreen.classList.add("hidden");
        dashboard.classList.remove("hidden");

      } else {
        window.location.href = "index.html";
      }
    });

    document.getElementById("logout").addEventListener("click", () => {
      signOut(auth).then(() => {
        window.location.href = "index.html";
      }).catch((error) => {
        console.error("Sign out error:", error);
      });
    });

    function setRoleBadge(role) {
      const roleBadge = document.getElementById("role-badge");
      if (!roleBadge) return;
      let colorClass = "";
      switch (role.toLowerCase()) {
        case "admin":
          colorClass = "bg-red-500";
          break;
        case "moderator":
          colorClass = "bg-blue-500";
          break;
        case "member":
          colorClass = "bg-green-500";
          break;
        default:
          colorClass = "bg-gray-500";
      }
      roleBadge.className = `${colorClass} text-white text-xs font-bold px-2 py-1 rounded`;
      roleBadge.textContent = role;
    }
  </script>
</body>
</html>
