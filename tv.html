<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live TV Channels - Premium UI</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Custom scrollbar for horizontal scroll on mobile */
    .cards-container::-webkit-scrollbar {
      height: 8px;
    }
    .cards-container::-webkit-scrollbar-track {
      background: #1f2937; /* Tailwind gray-800 */
    }
    .cards-container::-webkit-scrollbar-thumb {
      background-color: #3b82f6; /* Tailwind blue-500 */
      border-radius: 20px;
    }
    /* Card hover glow */
    .card:hover {
      box-shadow: 0 0 15px #3b82f6, 0 0 30px #60a5fa;
      transform: translateY(-6px);
      transition: all 0.3s ease;
      z-index: 10;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

  <header class="flex items-center justify-between p-6 bg-gray-800 shadow-md">
    <h1 class="text-3xl font-extrabold tracking-tight">Live TV</h1>
    <input 
      id="searchInput" 
      type="search" 
      placeholder="Search channels" 
      class="form-control form-control-lg w-72 transition duration-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" />
  </header>

  <div class="filters flex gap-4 p-6 bg-gray-800 shadow-inner">
    <select id="regionSelect" class="form-select form-select-lg w-48 rounded-md text-gray-900">
      <option value="">Select Region</option>
      <option value="asia">Asia</option>
      <option value="europe">Europe</option>
    </select>
    <select id="sectionSelect" class="form-select form-select-lg w-48 rounded-md text-gray-900">
      <option value="">Select Section</option>
      <option value="news">News</option>
      <option value="sports">Sports</option>
    </select>
  </div>

  <main class="max-w-7xl mx-auto p-6">
    <div 
      id="cardsContainer" 
      class="cards-container grid grid-cols-4 gap-6 overflow-x-auto snap-x snap-mandatory
      scroll-smooth
      [&::-webkit-scrollbar]:block
      sm:grid-cols-4 sm:overflow-visible"
      style="scroll-padding-inline:1.5rem"
    >
      <!-- Channel cards injected here -->
    </div>

    <video 
      id="videoPlayer" 
      controls 
      playsinline 
      class="w-full max-w-4xl mt-12 mx-auto rounded-lg shadow-lg bg-black"
      preload="metadata"
    ></video>
  </main>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script>
    const channels = [
      {
        name: "Channel 1",
        thumbnail: "https://via.placeholder.com/300x140?text=Channel+1",
        stream: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
        region: "asia",
        section: "news"
      },
      {
        name: "Channel 2",
        thumbnail: "https://via.placeholder.com/300x140?text=Channel+2",
        stream: "https://test-streams.mux.dev/test_001/stream.m3u8",
        region: "europe",
        section: "sports"
      },
      {
        name: "Channel 3",
        thumbnail: "https://via.placeholder.com/300x140?text=Channel+3",
        stream: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8",
        region: "asia",
        section: "sports"
      },
      {
        name: "Channel 4",
        thumbnail: "https://via.placeholder.com/300x140?text=Channel+4",
        stream: "https://bitdash-a.akamaihd.net/content/mi/bbb.m3u8",
        region: "europe",
        section: "news"
      }
    ];

    const cardsContainer = document.getElementById('cardsContainer');
    const video = document.getElementById('videoPlayer');
    const searchInput = document.getElementById('searchInput');
    const regionSelect = document.getElementById('regionSelect');
    const sectionSelect = document.getElementById('sectionSelect');

    function renderCards(filterFn = () => true) {
      cardsContainer.innerHTML = '';
      channels.filter(filterFn).forEach(channel => {
        const card = document.createElement('div');
        card.className = 'card rounded-lg bg-gray-800 shadow-md cursor-pointer flex flex-col overflow-hidden transition-transform duration-300 snap-center';
        card.innerHTML = `
          <img src="${channel.thumbnail}" alt="${channel.name}" class="w-full h-36 object-cover" />
          <div class="p-4 flex flex-col flex-grow">
            <h3 class="text-lg font-semibold mb-3">${channel.name}</h3>
            <button class="btn btn-primary mt-auto">Play</button>
          </div>
        `;
        card.querySelector('button').addEventListener('click', () => playStream(channel.stream));
        cardsContainer.appendChild(card);
      });
    }

    function playStream(url) {
      if (Hls.isSupported()) {
        if (window.hls) {
          window.hls.destroy();
        }
        window.hls = new Hls();
        window.hls.loadSource(url);
        window.hls.attachMedia(video);
        window.hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play();
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', () => {
          video.play();
        });
      }
    }

    function filterChannels() {
      const searchTerm = searchInput.value.toLowerCase();
      const selectedRegion = regionSelect.value;
      const selectedSection = sectionSelect.value;

      renderCards(channel => {
        return (
          (!selectedRegion || channel.region === selectedRegion) &&
          (!selectedSection || channel.section === selectedSection) &&
          channel.name.toLowerCase().includes(searchTerm)
        );
      });
    }

    searchInput.addEventListener('input', filterChannels);
    regionSelect.addEventListener('change', filterChannels);
    sectionSelect.addEventListener('change', filterChannels);

    renderCards();
  </script>

</body>
</html>
