<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live TV Channels - Premium UI</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .cards-container::-webkit-scrollbar {
      height: 8px;
    }
    .cards-container::-webkit-scrollbar-track {
      background: #1f2937; /* Tailwind gray-800 */
    }
    .cards-container::-webkit-scrollbar-thumb {
      background-color: #3b82f6; /* Tailwind blue-500 */
      border-radius: 20px;
    }
    .card:hover {
      box-shadow: 0 0 15px #3b82f6, 0 0 30px #60a5fa;
      transform: translateY(-6px);
      transition: all 0.3s ease;
      z-index: 10;
    }
    .card {
      display: flex;
      flex-direction: column;
      height: 14rem;
      cursor: pointer;
      background-color: #1f2937;
      border-radius: 0.5rem;
      overflow: hidden;
      box-shadow: 0 2px 8px rgb(0 0 0 / 0.5);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    .card img {
      flex: 0 0 90%;
      object-fit: cover;
      width: 100%;
      border-bottom: 1px solid #374151;
    }
    .card .card-name {
      flex: 0 0 10%;
      text-align: center;
      padding: 0.3rem 0;
      font-weight: 600;
      color: #d1d5db;
      font-size: 0.875rem;
      background-color: #111827;
      user-select: none;
    }
    /* Modal overlay styles */
    #playerModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    #playerModal.active {
      display: flex;
    }
    #playerModal video {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 0.5rem;
      box-shadow: 0 0 25px #3b82f6;
      background: black;
    }
    #playerModal .close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: #3b82f6;
      border: none;
      border-radius: 9999px;
      width: 2.5rem;
      height: 2.5rem;
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 0 15px #3b82f6;
      transition: background 0.3s ease;
    }
    #playerModal .close-btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

  <header class="flex items-center justify-between p-6 bg-gray-800 shadow-md">
    <h1 class="text-3xl font-extrabold tracking-tight">Live TV</h1>
    <input 
      id="searchInput" 
      type="search" 
      placeholder="Search channels" 
      class="form-control form-control-lg w-72 transition duration-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" />
  </header>

  <div class="filters flex gap-4 p-6 bg-gray-800 shadow-inner">
    <select id="regionSelect" class="form-select form-select-lg w-48 rounded-md text-gray-900">
      <option value="">Select Region</option>
      <option value="asia">Asia</option>
      <option value="europe">Europe</option>
    </select>
    <select id="sectionSelect" class="form-select form-select-lg w-48 rounded-md text-gray-900">
      <option value="">Select Section</option>
      <option value="news">News</option>
      <option value="sports">Sports</option>
    </select>
  </div>

  <main class="max-w-7xl mx-auto p-6 space-y-12">
    <!-- Sections dynamically injected -->
  </main>

  <!-- Modal for video player -->
  <div id="playerModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="close-btn" aria-label="Close video player">&times;</button>
    <video id="videoPlayer" controls playsinline preload="metadata"></video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script>
    const channels = [
      {
        name: "Channel 1",
        thumbnail: "https://via.placeholder.com/300x140?text=Channel+1",
        stream: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
        region: "asia",
        section: "news"
      },
      {
        name: "Channel 2",
        thumbnail: "https://via.placeholder.com/300x140?text=Channel+2",
        stream: "https://test-streams.mux.dev/test_001/stream.m3u8",
        region: "europe",
        section: "sports"
      },
      {
        name: "Channel 3",
        thumbnail: "https://via.placeholder.com/300x140?text=Channel+3",
        stream: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8",
        region: "asia",
        section: "sports"
      },
      {
        name: "Channel 4",
        thumbnail: "https://via.placeholder.com/300x140?text=Channel+4",
        stream: "https://bitdash-a.akamaihd.net/content/mi/bbb.m3u8",
        region: "europe",
        section: "news"
      }
    ];

    const mainContainer = document.querySelector('main');
    const video = document.getElementById('videoPlayer');
    const searchInput = document.getElementById('searchInput');
    const regionSelect = document.getElementById('regionSelect');
    const sectionSelect = document.getElementById('sectionSelect');
    const modal = document.getElementById('playerModal');
    const closeBtn = modal.querySelector('.close-btn');

    function playStream(url) {
      if (Hls.isSupported()) {
        if (window.hls) {
          window.hls.destroy();
        }
        window.hls = new Hls();
        window.hls.loadSource(url);
        window.hls.attachMedia(video);
        window.hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play();
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', () => {
          video.play();
        });
      }
    }

    function openModal(url) {
      playStream(url);
      modal.classList.add('active');
      document.body.style.overflow = 'hidden'; // prevent background scroll
    }

    function closeModal() {
      modal.classList.remove('active');
      if(window.hls) window.hls.destroy();
      video.pause();
      video.src = "";
      document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeModal);

    modal.addEventListener('click', (e) => {
      if(e.target === modal) {
        closeModal();
      }
    });

    // Always 3 columns even on mobile (portrait)
    function renderSections() {
      const searchTerm = searchInput.value.toLowerCase();
      const selectedRegion = regionSelect.value;
      const selectedSection = sectionSelect.value;

      let filtered = channels.filter(channel => {
        return (
          (!selectedRegion || channel.region === selectedRegion) &&
          (!selectedSection || channel.section === selectedSection) &&
          channel.name.toLowerCase().includes(searchTerm)
        );
      });

      const grouped = filtered.reduce((acc, channel) => {
        let key = channel.region || 'Other';
        if (!acc[key]) acc[key] = [];
        acc[key].push(channel);
        return acc;
      }, {});

      mainContainer.innerHTML = '';

      Object.entries(grouped).forEach(([sectionName, channelsList]) => {
        const sectionEl = document.createElement('section');
        sectionEl.className = 'space-y-4';

        sectionEl.innerHTML = `
          <h2 class="text-2xl font-semibold capitalize border-b border-gray-700 pb-2">${sectionName} Channels</h2>
          <div class="grid grid-cols-3 gap-6">
            <!-- cards here -->
          </div>
        `;

        const grid = sectionEl.querySelector('div');
        channelsList.forEach(channel => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="${channel.thumbnail}" alt="${channel.name}" />
            <div class="card-name">${channel.name}</div>
          `;
          card.addEventListener('click', () => openModal(channel.stream));
          grid.appendChild(card);
        });

        mainContainer.appendChild(sectionEl);
      });
    }

    searchInput.addEventListener('input', renderSections);
    regionSelect.addEventListener('change', renderSections);
    sectionSelect.addEventListener('change', renderSections);

    renderSections();
  </script>

</body>
</html>
