<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Approved Posts - TamilGeo</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body class="bg-gray-100 text-gray-900 flex flex-col min-h-screen">

  <!-- Shared Header -->
  <div id="shared-header"></div>

  <!-- Post Grid -->
  <main class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-grow max-w-7xl mx-auto" id="posts-container">
    <!-- Posts will be loaded here -->
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const postsRef = ref(db, 'posts');
    const container = document.getElementById('posts-container');

    let isAdmin = false;

    // Utility: truncate text to max length with ellipsis
    function truncateText(text, maxLength = 150) {
      if (!text) return "";
      return text.length > maxLength ? text.substring(0, maxLength) + "..." : text;
    }

    // Utility: calculate days ago from timestamp
    function daysAgo(timestamp) {
      const now = Date.now();
      const diff = now - timestamp;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      if (days === 0) return "Today";
      if (days === 1) return "1 day ago";
      return `${days} days ago`;
    }

    // Edit post handler (stub)
    window.editPost = (postId, title, content) => {
      alert(`Edit post: ${postId}\nTitle: ${title}\nContent: ${content}`);
    };

    // Delete post handler + refresh
    window.deletePost = async (postId) => {
      if (confirm("Are you sure you want to delete this post?")) {
        try {
          await remove(ref(db, 'posts/' + postId));
          alert("Post deleted!");
          loadPosts();
        } catch (error) {
          alert("Error deleting post: " + error.message);
        }
      }
    };

    // Load posts and render cards
    function loadPosts() {
      onValue(postsRef, (snapshot) => {
        let postsArray = [];

        snapshot.forEach(childSnapshot => {
          const post = childSnapshot.val();
          post.id = childSnapshot.key;
          postsArray.push(post);
        });

        // Only approved posts
        postsArray = postsArray.filter(post => post.status === "approved");
        postsArray.sort((a, b) => b.date - a.date);

        container.innerHTML = postsArray.map(post => `
          <div class="bg-white rounded-lg shadow overflow-hidden flex flex-col">
            ${post.image ? `<img src="${post.image}" alt="${post.title}" class="w-full h-48 object-cover"/>` : ""}
            <div class="p-4 flex flex-col flex-grow">
              <h2 class="text-xl font-bold mb-2">
                <a href="post-view.html?id=${post.id}" class="hover:text-blue-600 transition">${post.title}</a>
              </h2>
              <p class="text-gray-700 text-sm mb-4 flex-grow">${truncateText(post.excerpt || post.content)}</p>
              <div class="flex justify-between text-xs text-gray-500 mt-auto">
                <span>By: ${post.author || "Unknown"}</span>
                <span>Posted: ${daysAgo(post.date)}</span>
              </div>
              ${isAdmin ? `
                <div class="mt-3 flex gap-2">
                  <button 
                    onclick="editPost('${post.id}', \`${post.title.replace(/`/g, '\\`')}\`, \`${(post.content || '').replace(/`/g, '\\`')}\`)" 
                    class="bg-yellow-500 text-white px-3 py-1 rounded text-sm flex items-center gap-1">
                    <i class="fa fa-edit"></i> Edit
                  </button>
                  <button 
                    onclick="deletePost('${post.id}')" 
                    class="bg-red-500 text-white px-3 py-1 rounded text-sm flex items-center gap-1">
                    <i class="fa fa-trash"></i> Delete
                  </button>
                </div>
              ` : ""}
            </div>
          </div>
        `).join('');
      });
    }

    // Auth state & admin check
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const userSnap = await get(ref(db, "users/" + user.uid));
          isAdmin = userSnap.exists() && userSnap.val().role === 'admin';
          console.log("User is admin:", isAdmin);
        } catch {
          isAdmin = false;
        }
      } else {
        isAdmin = false;
      }
      loadPosts();
    });
  </script>

  <!-- Universal Header Loader -->
  <script type="module" src="header.js"></script>

  <!-- Footer Loader -->
  <footer id="footer" class="mt-auto"></footer>
  <script type="module" src="js/footer.js"></script>

</body>
</html>
