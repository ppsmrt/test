<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Approved Posts - TamilGeo</title>

  <!-- ✅ Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ✅ Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body class="bg-gray-100 text-gray-900 flex flex-col min-h-screen">

  <!-- ✅ Shared Header -->
  <div id="shared-header"></div>

  <!-- ✅ Post Grid -->
  <main class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-grow max-w-7xl mx-auto" id="posts-container">
    <!-- Posts will be loaded here -->
  </main>

  <!-- ✅ Firebase Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth();

    const container = document.getElementById('posts-container');
    let isAdmin = false;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userSnap = await get(ref(db, "users/" + user.uid));
        if (userSnap.exists()) {
          isAdmin = userSnap.val().isAdmin === true;
        }
        loadPosts();
      } else {
        loadPosts();
      }
    });

    function loadPosts() {
      const postsRef = ref(db, 'posts');
      onValue(postsRef, (snapshot) => {
        let postsArray = [];

        snapshot.forEach(childSnapshot => {
          postsArray.push({ id: childSnapshot.key, ...childSnapshot.val() });
        });

        postsArray.sort((a, b) => b.date - a.date);

        container.innerHTML = postsArray.map(post => `
          <div class="bg-white rounded-lg shadow overflow-hidden flex flex-col">
            ${post.image ? `<img src="${post.image}" alt="${post.title}" class="w-full h-48 object-cover"/>` : ""}
            <div class="p-4 flex flex-col flex-grow">
              <h2 class="text-xl font-bold mb-2">${post.title}</h2>
              <p class="text-gray-700 text-sm mb-4 flex-grow">
                ${post.excerpt ? post.excerpt : (post.content ? post.content.substring(0, 120) + "..." : "")}
              </p>
              <p class="text-xs text-gray-500 mt-auto">
                By ${post.author || "Unknown"} • ${new Date(post.date).toLocaleDateString()}
              </p>

              ${isAdmin ? `
                <div class="mt-3 flex gap-2">
                  <button onclick="editPost('${post.id}', '${post.title.replace(/'/g, "\\'")}', '${(post.content || "").replace(/'/g, "\\'")}')" 
                    class="bg-yellow-500 text-white px-3 py-1 rounded text-sm flex items-center gap-1">
                    <i class="fa fa-edit"></i> Edit
                  </button>
                  <button onclick="deletePost('${post.id}')" 
                    class="bg-red-500 text-white px-3 py-1 rounded text-sm flex items-center gap-1">
                    <i class="fa fa-trash"></i> Delete
                  </button>
                </div>
              ` : ""}
            </div>
          </div>
        `).join('');
      });
    }

    // ✅ Edit Post
    window.editPost = async function(postId, title, content) {
      const newTitle = prompt("Edit Title:", title);
      const newContent = prompt("Edit Content:", content);
      if (newTitle !== null && newContent !== null) {
        await update(ref(db, "posts/" + postId), { title: newTitle, content: newContent });
        alert("Post updated!");
      }
    };

    // ✅ Delete Post
    window.deletePost = async function(postId) {
      if (confirm("Are you sure you want to delete this post?")) {
        await remove(ref(db, "posts/" + postId));
        alert("Post deleted!");
      }
    };
  </script>

  <!-- ✅ Universal Header Loader -->
  <script type="module" src="header.js"></script>

  <!-- ✅ Footer Loader -->
  <footer id="footer" class="mt-auto"></footer>
  <script type="module" src="js/footer.js"></script>

</body>
</html>
