<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notifications Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

  <h1 class="text-3xl font-bold mb-6">Dismissed Notifications</h1>

  <div id="notificationsContainer" class="space-y-4">
    <p class="text-gray-500">Loading notifications...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    async function loadDismissedNotifications() {
      const container = document.getElementById("notificationsContainer");
      container.innerHTML = "";
      const snap = await get(ref(db, "notifications"));
      if (snap.exists()) {
        let found = false;
        snap.forEach(n => {
          const data = n.val();
          if (data.active === false) {
            found = true;
            const div = document.createElement("div");
            div.className = "bg-white shadow rounded p-4";
            div.innerHTML = `
              <h2 class="font-bold text-lg">${data.title}</h2>
              <p class="mt-1">${data.message}</p>
              <p class="text-xs text-gray-400 mt-2">${new Date(data.timestamp).toLocaleString()}</p>
            `;
            container.appendChild(div);
          }
        });
        if (!found) {
          container.innerHTML = `<p class="text-gray-500">No dismissed notifications.</p>`;
        }
      } else {
        container.innerHTML = `<p class="text-gray-500">No notifications found.</p>`;
      }
    }

    onAuthStateChanged(auth, user => {
      if (user) {
        loadDismissedNotifications();
      } else {
        window.location.href = "login.html";
      }
    });
  </script>

</body>
</html>
