<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- Shared Header -->
  <header class="flex justify-between items-center bg-white shadow px-4 py-3 sticky top-0 z-50">
    <h1 class="text-2xl font-bold text-green-600">TamilGeo</h1>
    <nav class="flex space-x-4">
      <a href="index.html" class="text-gray-700 hover:text-green-600 font-medium">Home</a>
      <a href="about.html" class="text-gray-700 hover:text-green-600 font-medium">About</a>
      <a href="bookmarks.html" class="text-gray-700 hover:text-green-600 font-medium">Bookmarks</a>
    </nav>
  </header>

  <!-- Login Form -->
  <main class="max-w-md mx-auto mt-10 bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold mb-4 text-center">🔐 Log In</h2>

    <form id="login-form" class="space-y-4">
      <input type="text" id="identifier" placeholder="Email or Username" required class="w-full p-3 border rounded" />
      <input type="password" id="password" placeholder="Password" required class="w-full p-3 border rounded" />
      <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Log In</button>
    </form>

    <p class="text-center text-sm mt-4">Don't have an account? 
      <a href="signup.html" class="text-blue-600 hover:underline">Sign up</a>
    </p>

    <p id="error-msg" class="text-red-600 text-sm text-center mt-4"></p>
  </main>

  <!-- Firebase Login Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const identifier = document.getElementById("identifier").value.trim();
      const password = document.getElementById("password").value.trim();
      const loginBtn = document.getElementById("loginBtn");
      const errorMsg = document.getElementById("error-msg");

      errorMsg.textContent = "";

      if (!identifier || !password) {
        errorMsg.textContent = "❌ Please enter both email/username and password.";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      let emailToLogin = identifier;

      try {
        // If not an email, treat as username and get email from DB
        if (!identifier.includes("@")) {
          const usersRef = ref(db, "users");
          const snapshot = await get(usersRef);

          if (!snapshot.exists()) throw new Error("No users found.");

          const users = snapshot.val();
          const matchedUser = Object.values(users).find(user => user.username === identifier);

          if (!matchedUser) throw new Error("No user found with this username.");

          emailToLogin = matchedUser.email;
        }

        // Login using email
        await signInWithEmailAndPassword(auth, emailToLogin, password);
        window.location.href = "dashboard.html";

      } catch (error) {
        const code = error.code || "";
        if (code === "auth/user-not-found") {
          errorMsg.textContent = "❌ User not found.";
        } else if (code === "auth/wrong-password") {
          errorMsg.textContent = "❌ Incorrect password.";
        } else if (code === "auth/invalid-email") {
          errorMsg.textContent = "❌ Invalid email format.";
        } else {
          errorMsg.textContent = "❌ " + (error.message || "Something went wrong.");
        }

        loginBtn.disabled = false;
        loginBtn.textContent = "Log In";
      }
    });
  </script>
</body>
</html>
