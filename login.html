<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- Shared Header -->
  <header class="flex justify-between items-center bg-white shadow px-4 py-3 sticky top-0 z-50">
    <h1 class="text-2xl font-bold text-green-600">TamilGeo</h1>
    <nav class="flex space-x-4">
      <a href="index.html" class="text-gray-700 hover:text-green-600 font-medium">Home</a>
      <a href="about.html" class="text-gray-700 hover:text-green-600 font-medium">About</a>
      <a href="bookmarks.html" class="text-gray-700 hover:text-green-600 font-medium">Bookmarks</a>
    </nav>
  </header>

  <!-- Login Form -->
  <main class="max-w-md mx-auto mt-10 bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold mb-4 text-center">🔐 Log In</h2>

    <form id="login-form" class="space-y-4">
      <input type="text" id="identifier" placeholder="Email or Username" required class="w-full p-3 border rounded" />
      <input type="password" id="password" placeholder="Password" required class="w-full p-3 border rounded" />
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Log In</button>
    </form>

    <p class="text-center text-sm mt-4">Don't have an account? <a href="signup.html" class="text-blue-600 hover:underline">Sign up</a></p>
  </main>

  <!-- Firebase Login Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const identifier = document.getElementById("identifier").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        // Try logging in directly as email
        const userCredential = await signInWithEmailAndPassword(auth, identifier, password);
        const uid = userCredential.user.uid;

        // Check role
        const userRef = ref(db, 'users/' + uid);
        onValue(userRef, snapshot => {
          const data = snapshot.val();
          if (data?.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }, { onlyOnce: true });

      } catch (err) {
        // Try username-based login
        const usersRef = ref(db, "users");
        onValue(usersRef, snapshot => {
          const users = snapshot.val();
          const match = Object.entries(users).find(([uid, data]) => data.username === identifier);

          if (match) {
            const [uid, user] = match;
            signInWithEmailAndPassword(auth, user.email, password)
              .then(() => {
                const userRef = ref(db, 'users/' + uid);
                onValue(userRef, snap => {
                  const data = snap.val();
                  if (data?.role === 'admin') {
                    window.location.href = 'admin.html';
                  } else {
                    window.location.href = 'dashboard.html';
                  }
                }, { onlyOnce: true });
              })
              .catch(err => alert("Login failed: " + err.message));
          } else {
            alert("❌ No such user or wrong password.");
          }
        }, { onlyOnce: true });
      }
    });
  </script>
</body>
</html>
