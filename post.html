<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TamilGeo - Post</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-RXf+QSDCUQs5uw06dTr3zVRBZVys0az0k5Jk9gXjTf5A6c2G5Qv4NME2a43YUM3akblNE0+1HbPTz7fG0voL6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- Universal Header -->
  <div id="shared-header"></div>

  <!-- Post Container -->
  <main class="max-w-3xl mx-auto p-4" id="post-container"></main>

  <!-- Back to Top Button -->
  <div class="fixed bottom-4 right-4">
    <button onclick="window.scrollTo({top:0,behavior:'smooth'})"
      class="bg-blue-600 text-white px-4 py-2 rounded-full shadow-lg hover:bg-blue-700 transition">
      ↑ Top
    </button>
  </div>

  <!-- Universal Footer -->
  <div id="footer-container" class="mt-10"></div>

  <!-- Firebase & Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const postId = new URLSearchParams(window.location.search).get("id");
    const container = document.getElementById("post-container");

    if (!postId) {
      container.innerHTML = "<p class='text-red-500'>Invalid Post ID.</p>";
      throw new Error("Missing post ID");
    }

    const postURL = `https://public-api.wordpress.com/wp/v2/sites/tamilgeo.wordpress.com/posts/${postId}`;

    fetch(postURL)
      .then(res => res.json())
      .then(post => {
        const featuredImage = post.jetpack_featured_media_url
          ? `<div class="aspect-video mb-4 rounded-md overflow-hidden"><img src="${post.jetpack_featured_media_url}" class="w-full h-full object-cover" alt="Featured Image"></div>`
          : "";

        const contentWithVideos = post.content.rendered.replace(/<iframe.*?<\/iframe>/g,
          match => `<div class="video-container aspect-video">${match}</div>`);

        const daysAgo = formatDaysAgo(post.date);
        const pageUrl = encodeURIComponent(window.location.href);
        const postTitle = encodeURIComponent(post.title.rendered);

        container.innerHTML = `
          <div class="bg-white p-6 rounded-lg shadow">
            ${featuredImage}
            <h2 class="text-2xl font-bold mb-2">${post.title.rendered}</h2>
            <div class="text-sm text-gray-500 mb-4">
              👤 TamilGeo | 🗓️ ${daysAgo}
            </div>

            <div class="prose max-w-none mb-6">${contentWithVideos}</div>

            <div class="mt-4 flex flex-wrap items-center gap-3">
              <button id="like-btn" class="bg-pink-500 text-white px-3 py-1 rounded hover:bg-pink-600">
                ♥ Like (<span id="like-count">0</span>)
              </button>

              <a href="https://wa.me/?text=${postTitle}%20${pageUrl}" target="_blank" class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600">
                <i class="fab fa-whatsapp"></i>
              </a>
              <a href="https://www.facebook.com/sharer/sharer.php?u=${pageUrl}" target="_blank" class="bg-blue-700 text-white px-3 py-1 rounded hover:bg-blue-800">
                <i class="fab fa-facebook-f"></i>
              </a>
              <a href="https://twitter.com/intent/tweet?text=${postTitle}&url=${pageUrl}" target="_blank" class="bg-blue-400 text-white px-3 py-1 rounded hover:bg-blue-500">
                <i class="fab fa-twitter"></i>
              </a>
            </div>

            <div class="mt-6">
              <h3 class="font-semibold text-lg mb-2">💬 Comments</h3>
              <textarea id="comment-box" placeholder="Write a comment..." class="w-full p-2 border rounded mb-2"></textarea>
              <button id="comment-btn" class="bg-green-600 text-white px-3 py-1 rounded">Post Comment</button>
              <div id="comments" class="mt-4 space-y-2 text-sm text-gray-700"></div>
            </div>
          </div>
        `;

        setupFirebase();
      });

    function formatDaysAgo(dateStr) {
      const postDate = new Date(dateStr);
      const now = new Date();
      const diffDays = Math.floor((now - postDate) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return "Today";
      if (diffDays === 1) return "1 day ago";
      return `${diffDays} days ago`;
    }

    function setupFirebase() {
      const likeBtn = document.getElementById("like-btn");
      const likeCountSpan = document.getElementById("like-count");
      const commentBox = document.getElementById("comment-box");
      const commentBtn = document.getElementById("comment-btn");
      const commentsDiv = document.getElementById("comments");

      const likesRef = ref(db, `likes/post_${postId}`);
      const commentsRef = ref(db, `comments/post_${postId}`);

      // Load Likes
      onValue(likesRef, snapshot => {
        likeCountSpan.textContent = snapshot.val() || 0;
      });

      // Like Handler
      likeBtn.addEventListener("click", () => {
        get(likesRef).then(snapshot => {
          const currentLikes = snapshot.val() || 0;
          set(likesRef, currentLikes + 1);
        });
      });

      // Load Comments
      onValue(commentsRef, snapshot => {
        commentsDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
          Object.values(data).forEach(comment => {
            commentsDiv.innerHTML += `<div class="bg-gray-100 p-2 rounded">${comment}</div>`;
          });
        }
      });

      // Post Comment
      commentBtn.addEventListener("click", () => {
        const commentText = commentBox.value.trim();
        if (commentText.length > 0) {
          push(commentsRef, commentText);
          commentBox.value = "";
        }
      });
    }
  </script>

  <!-- Universal Header & Footer Scripts -->
  <script src="/js/header.js"></script>
  <script src="/js/footer.js"></script>
</body>
</html>
