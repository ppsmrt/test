<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Post - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

  <!-- ✅ Shared Header -->
  <div id="shared-header"></div>

  <main class="max-w-3xl mx-auto p-6 flex-grow">
    <h1 class="text-3xl font-bold mb-6">✍ Submit a Post</h1>

    <form id="postForm" class="bg-white p-6 rounded shadow">
      <input type="text" id="title" placeholder="Post Title" class="w-full p-2 border rounded mb-4" required>
      <textarea id="content" placeholder="Post Content" class="w-full p-2 border rounded mb-4" rows="6" required></textarea>
      <input type="url" id="image" placeholder="Image URL (optional)" class="w-full p-2 border rounded mb-4">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Submit</button>
    </form>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const postForm = document.getElementById("postForm");

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Please log in to submit a post.");
        window.location.href = "/login.html";
        return;
      }

      postForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const title = document.getElementById("title").value.trim();
        const content = document.getElementById("content").value.trim();
        const image = document.getElementById("image").value.trim();

        if (!title || !content) {
          alert("Please fill in all required fields.");
          return;
        }

        const postId = push(ref(db, "pendingPosts")).key;
        const postData = {
          title,
          content,
          image: image || null,
          author: user.displayName || user.email,
          date: Date.now(),
          status: "pending"
        };

        set(ref(db, "pendingPosts/" + postId), postData).then(() => {
          alert("✅ Post submitted for approval!");
          postForm.reset();
        }).catch(err => {
          console.error(err);
          alert("❌ Error submitting post.");
        });
      });
    });
  </script>

  <!-- ✅ Universal Header Loader -->
  <script type="module" src="header.js"></script>

  <!-- ✅ Footer -->
  <footer id="footer" class="mt-auto"></footer>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
