<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Post - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- 🔼 Header -->
  <header class="flex justify-between items-center bg-white shadow px-4 py-3 sticky top-0 z-50">
    <h1 class="text-2xl font-bold text-gray-800">TamilGeo</h1>
    <nav class="space-x-4">
      <a href="index.html" class="text-blue-600 hover:underline">Home</a>
      <a href="about.html" class="text-blue-600 hover:underline">About</a>
    </nav>
  </header>

  <!-- 📤 Submit Form -->
  <main class="max-w-2xl mx-auto p-6 mt-4 bg-white shadow rounded">
    <h2 class="text-xl font-bold mb-4">✍️ Submit a Post</h2>
    <form id="submit-form" class="space-y-4">
      <input type="text" id="title" placeholder="Post Title" class="w-full p-2 border rounded" required />
      <textarea id="content" placeholder="Post Content (HTML allowed)" rows="6" class="w-full p-2 border rounded" required></textarea>
      <input type="url" id="image" placeholder="Optional Image URL" class="w-full p-2 border rounded" />
      <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">📤 Submit</button>
    </form>
    <p id="success-msg" class="text-green-600 mt-4 hidden">✅ Post submitted for review!</p>
  </main>

  <!-- 🔥 Firebase Submit Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da",
      measurementId: "G-2D45G35PM2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const form = document.getElementById("submit-form");
    const successMsg = document.getElementById("success-msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = document.getElementById("title").value.trim();
      const content = document.getElementById("content").value.trim();
      const image = document.getElementById("image").value.trim();

      if (!title || !content) return alert("Title and content are required.");

      const postData = {
        title,
        content,
        image,
        date: new Date().toISOString()
      };

      try {
        await push(ref(db, "pending_posts"), postData);
        form.reset();
        successMsg.classList.remove("hidden");
      } catch (error) {
        alert("❌ Error submitting post.");
        console.error(error);
      }
    });
  </script>
</body>
</html>
