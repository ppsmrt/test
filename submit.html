<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Post - TamilGeo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- ✅ Header -->
  <header class="flex justify-between items-center bg-white shadow px-4 py-3 sticky top-0 z-50">
    <h1 class="text-2xl font-bold text-green-600">TamilGeo</h1>
    <nav class="flex space-x-4">
      <a href="index.html" class="text-gray-700 hover:text-green-600 font-medium">Home</a>
      <a href="about.html" class="text-gray-700 hover:text-green-600 font-medium">About</a>
      <a href="bookmarks.html" class="text-gray-700 hover:text-green-600 font-medium">Bookmarks</a>
    </nav>
  </header>

  <!-- 📝 Submit Form -->
  <main class="max-w-3xl mx-auto mt-10 bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-6 text-center">📝 Submit a New Post</h1>

    <form id="submit-form" class="space-y-4">
      <input type="text" id="title" placeholder="Post Title" required
             class="w-full p-3 border border-gray-300 rounded" />

      <textarea id="content" placeholder="Post Content" rows="10" required
                class="w-full p-3 border border-gray-300 rounded"></textarea>

      <input type="text" id="category" placeholder="Category (e.g. Geography)" 
             class="w-full p-3 border border-gray-300 rounded" />

      <input type="text" id="tags" placeholder="Tags (comma separated)" 
             class="w-full p-3 border border-gray-300 rounded" />

      <input type="url" id="image" placeholder="Featured Image URL"
             class="w-full p-3 border border-gray-300 rounded" />

      <input type="text" id="author" placeholder="Author Name" required
             class="w-full p-3 border border-gray-300 rounded" />

      <textarea id="excerpt" placeholder="Short Description (optional)" rows="3"
                class="w-full p-3 border border-gray-300 rounded"></textarea>

      <select id="language" class="w-full p-3 border border-gray-300 rounded">
        <option value="ta">Tamil</option>
        <option value="en">English</option>
      </select>

      <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
        🚀 Submit Post
      </button>
    </form>

    <div id="status" class="mt-4 text-green-600 font-medium hidden">✅ Post submitted for review!</div>
  </main>

  <!-- 🔥 Firebase Submission Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const pendingRef = ref(db, 'pendingPosts');

    document.getElementById('submit-form').addEventListener('submit', e => {
      e.preventDefault();

      const data = {
        title: document.getElementById('title').value,
        content: document.getElementById('content').value,
        category: document.getElementById('category').value,
        tags: document.getElementById('tags').value,
        image: document.getElementById('image').value,
        author: document.getElementById('author').value,
        excerpt: document.getElementById('excerpt').value,
        language: document.getElementById('language').value,
        date: new Date().toISOString()
      };

      push(pendingRef, data).then(() => {
        document.getElementById('submit-form').reset();
        document.getElementById('status').classList.remove('hidden');
      });
    });
  </script>
</body>
</html>
