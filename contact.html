<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Admin - TamilGeo</title>

  <!-- ✅ Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ✅ Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 flex flex-col min-h-screen">

  <!-- ✅ Shared Header -->
  <div id="shared-header"></div>

  <!-- Main Content -->
  <main class="flex-grow flex items-center justify-center px-4 pt-6 sm:pt-12">
    <div class="max-w-xl w-full bg-white shadow-md rounded-xl p-6 sm:p-10 fade-in text-center">

      <!-- Profile Picture -->
      <img src="https://via.placeholder.com/120" alt="Admin Profile"
           class="w-28 h-28 rounded-full mx-auto border-4 border-green-500 shadow-md">

      <!-- Name & Role -->
      <h2 class="text-2xl sm:text-3xl font-bold mt-4 text-green-700">
        TamilGeo Admin
      </h2>
      <p class="text-gray-600">Developer & Maintainer — Inteksoft Solutions</p>

      <!-- Divider -->
      <div class="my-6 border-t border-gray-300"></div>

      <!-- Contact Info -->
      <div class="space-y-3 text-gray-700">
        <p><i class="fas fa-envelope text-green-600 mr-2"></i> support@tamilgeo.com</p>
        <p><i class="fas fa-phone text-green-600 mr-2"></i> +91 98765 43210</p>
        <p><i class="fas fa-map-marker-alt text-green-600 mr-2"></i> Chennai, Tamil Nadu</p>
      </div>

      <!-- Social Links -->
      <div class="mt-6 flex justify-center space-x-5">
        <a href="https://facebook.com" target="_blank" class="text-blue-600 hover:scale-110 transition"><i class="fab fa-facebook fa-2x"></i></a>
        <a href="https://twitter.com" target="_blank" class="text-sky-500 hover:scale-110 transition"><i class="fab fa-twitter fa-2x"></i></a>
        <a href="https://instagram.com" target="_blank" class="text-pink-500 hover:scale-110 transition"><i class="fab fa-instagram fa-2x"></i></a>
        <a href="https://linkedin.com" target="_blank" class="text-blue-700 hover:scale-110 transition"><i class="fab fa-linkedin fa-2x"></i></a>
        <a href="https://github.com" target="_blank" class="text-gray-800 hover:scale-110 transition"><i class="fab fa-github fa-2x"></i></a>
      </div>

    </div>
  </main>

  <!-- ✅ Footer Placeholder -->
  <div id="footer" class="mt-auto"></div>

  <!-- ✅ Inject Header & Footer -->
  <script type="module" src="header.js"></script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
