<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TamilGeo - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- ✅ Shared Header Placeholder -->
  <div id="shared-header"></div>

  <!-- ✅ Search Input -->
  <div class="p-4 max-w-xl mx-auto">
    <input
      type="text"
      id="searchInput"
      placeholder="Search posts..."
      class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
    />
  </div>

  <!-- ✅ Post Grid -->
  <main class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="posts-container">
    <!-- Posts will be injected here by main.js -->
  </main>

  <!-- ✅ Load More Button -->
  <div class="flex justify-center mt-6 mb-10">
    <button
      id="loadMoreBtn"
      class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg shadow-md transition hidden"
    >
      Load More
    </button>
  </div>

  <!-- ✅ Firebase Auth to Toggle Bookmark Icon -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDt86oFFa-h04TsfMWSFGe3UHw26WYoR-U",
      authDomain: "tamilgeoapp.firebaseapp.com",
      databaseURL: "https://tamilgeoapp-default-rtdb.firebaseio.com",
      projectId: "tamilgeoapp",
      storageBucket: "tamilgeoapp.appspot.com",
      messagingSenderId: "1092623024431",
      appId: "1:1092623024431:web:ea455dd68a9fcf480be1da"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => {
      const bookmarks = document.querySelectorAll('.bookmark-icon');
      bookmarks.forEach(icon => {
        if (user) {
          icon.classList.remove('hidden');
        } else {
          icon.classList.add('hidden');
        }
      });
    });
  </script>

  <!-- ✅ Scripts -->
  <script type="module" src="header.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
