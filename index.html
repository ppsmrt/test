<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TamilGeo - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- ✅ Header -->
  <header class="flex flex-col md:flex-row justify-between items-center bg-white shadow px-4 py-3 sticky top-0 z-50 gap-2">
    <h1 class="text-2xl font-bold text-gray-800">TamilGeo</h1>
    <nav class="space-x-4">
      <a href="index.html" class="text-blue-600 hover:underline">Home</a>
      <a href="about.html" class="text-blue-600 hover:underline">About</a>
    </nav>

    <!-- 🔍 Search Bar -->
    <input
      type="text"
      id="searchInput"
      placeholder="Search posts..."
      class="mt-2 md:mt-0 px-4 py-2 border rounded-md w-full md:w-80 text-sm"
    />
  </header>

  <!-- 🔽 Post Grid -->
  <main class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="posts-container">
    <!-- Posts will be injected here -->
  </main>

  <!-- 🔌 Scripts -->
  <script src="js/main.js"></script>
</body>
</html>
